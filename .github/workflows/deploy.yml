name: Deploy Firebase Functions

on:
  push:
    branches: [ main ]
    paths:
      - 'firebase-backend/functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install Firebase CLI
      run: npm install -g firebase-tools@13

    - name: Setup Google Credentials
      run: |
        echo '${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}' > /tmp/service-account.json
        echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/service-account.json" >> $GITHUB_ENV

    - name: Install dependencies
      working-directory: firebase-backend/functions
      run: npm ci

    - name: Deploy Firebase Functions
      working-directory: firebase-backend
      run: firebase deploy --only functions
      env:
        GOOGLE_APPLICATION_CREDENTIALS: /tmp/service-account.json
